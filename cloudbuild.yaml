steps:

# STEP 1: Build Dcoker Image
- name: 'gcr.io/cloud-builders/docker'
  args:
    - build
    - -t
    - us-central1-docker.pkg.dev/$PROJECT_ID/my-docker-repo/backend:$SHORT_SHA
    - .

# STEP 2: Push Image
- name: 'gcr.io/cloud-builders/docker'
  args:
    - push
    - us-central1-docker.pkg.dev/$PROJECT_ID/my-docker-repo/backend:$SHORT_SHA

# STEP 3: Deploy to GKE (update image)
- name: 'gcr.io/cloud-builders/kubectl'
  args:
    - set
    - image
    - deployment/backend
    - nginx=us-central1-docker.pkg.dev/$PROJECT_ID/my-docker-repo/backend:$SHORT_SHA
  env:
    - CLOUDSDK_COMPUTE_ZONE=us-central1-a
    - CLOUDSDK_CONTAINER_CLUSTER=prod-gke-cluster

images:
- us-central1-docker.pkg.dev/$PROJECT_ID/my-docker-repo/backend:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
